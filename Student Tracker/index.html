<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskcon Student Tracking System</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔐 Login View -->
    <div id="loginBox" class="login-screen">
        <div class="glass-card login-card">
            <h2 style="text-align:center; margin-bottom: 0.5rem; font-size: 1.8rem;">Welcome Back</h2>
            <p style="text-align:center; color: var(--text-dim); margin-bottom: 2.5rem;">Access your dashboard</p>
            
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>Username</label>
                <input id="username" type="text" placeholder="Enter your name">
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Password</label>
                <input id="password" type="password" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="width: 100%; justify-content: center; margin: 0;" onclick="login()">Sign In to Dashboard</button>
        </div>
    </div>

    <!-- 📊 Dashboard View -->
    <div id="app" style="display:none">
        <header>
            <div class="title-area">
                <h1>Dashboard</h1>
                <p id="greetingText">System Online</p>
            </div>
            <div id="roleBadge" class="role-badge">Access Level</div>
        </header>

        <div class="container">
            <!-- Data Entry Card -->
            <div class="glass-card">
                <div class="section-header">
                    <h2>Iskcon Student Tracking System</h2>
                </div>

                <div class="grid-form">
                    <div class="form-group">
                        <label>Student Name</label>
                        <input id="name" type="text" readonly>
                    </div>
                    <div class="form-group">
                        <label>Today's Date</label>
                        <input type="date" id="date">
                    </div>
                    <div class="form-group">
                        <label>Wake Up Time</label>
                        <input type="time" id="wake">
                    </div>
                    <div class="form-group">
                        <label>Rounds Chanted</label>
                        <input type="number" id="rounds" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Study Hours</label>
                        <input type="number" id="study" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Digital Wellbeing Screenshot</label>
                        <input type="file" id="photo" style="font-size: 0.8rem;">
                    </div>
                </div>

                <div style="text-align: right;">
                    <button class="btn-primary" id="saveBtn">Save Progress ➜</button>
                </div>
            </div>

            <!-- Table Card -->
            <div class="glass-card">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Consistency Records</h2>
                    <button class="btn-primary" style="margin:0; padding: 8px 16px; font-size: 0.8rem;" id="exportBtn">📥 Export to Excel</button>
                </div>
                <div class="table-wrap">
                    <table id="recordsTable">
                        <thead>
                            <tr id="tableHead">
                                <th>Name</th>
                                <th>Date</th>
                                <th>Wakeup</th>
                                <th>Rounds</th>
                                <th>Study</th>
                                <th>Digital Proof</th>
                                <!-- Actions Column automatically added for Admin -->
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Link JavaScript File -->
    <script type="module" src="script.js"></script>
</body>
</html>
